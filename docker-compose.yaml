version: '3.8'

services:
  db:
    image: postgres:16.3
    container_name: postres-db
    restart: always
    environment:
      POSTGRES_DB: echonet
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    volumes:
      - ./db-data:/var/lib/postgressql/data
    ports:
      - "5432:5432"
volumes:
  db-data: